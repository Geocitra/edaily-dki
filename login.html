<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Daily Report Pemprov DKI Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dki: { primary: '#1e3a8a', accent: '#f97316', dark: '#0f172a' }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    animation: {
                        'fade-up': 'fadeUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .hero-gradient {
            background: linear-gradient(to top, rgba(15, 23, 42, 1) 0%, rgba(15, 23, 42, 0.3) 100%);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-white font-sans antialiased text-slate-800">

    <div class="flex flex-col lg:flex-row min-h-screen w-full">

        <div
            class="relative w-full h-[35vh] lg:h-screen lg:w-[45%] xl:w-[50%] lg:sticky lg:top-0 bg-dki-dark overflow-hidden shrink-0">
            <div id="login-slider"
                class="flex w-full h-full transition-transform duration-[1.5s] ease-[cubic-bezier(0.4,0,0.2,1)]">
                <img src="assets/img/dki-1.png" class="w-full h-full object-cover flex-shrink-0 opacity-70"
                    alt="Aktivitas DKI 1">
                <img src="assets/img/dki-2.png" class="w-full h-full object-cover flex-shrink-0 opacity-70"
                    alt="Aktivitas DKI 2">
                <img src="assets/img/dki-3.png" class="w-full h-full object-cover flex-shrink-0 opacity-70"
                    alt="Aktivitas DKI 3">
            </div>

            <div class="absolute inset-0 hero-gradient flex flex-col justify-end p-6 md:p-10 lg:p-14">
                <img src="assets/img/dki.png"
                    class="h-12 md:h-16 lg:h-20 w-auto mb-4 md:mb-6 drop-shadow-lg object-contain origin-left transform scale-90 md:scale-100 transition-transform"
                    alt="Logo DKI" style="align-self: flex-start;">
                <h1
                    class="text-2xl md:text-3xl lg:text-4xl font-extrabold text-white mb-2 leading-tight tracking-tight drop-shadow-md">
                    Transformasi Kinerja<br><span class="text-dki-accent">Aparatur Sipil Negara</span>
                </h1>
                <p class="hidden md:block text-slate-300 text-sm lg:text-base font-medium max-w-md leading-relaxed">
                    Sistem Pelaporan Kinerja Harian (E-Daily Report) Terintegrasi Pemerintah Provinsi DKI Jakarta.
                </p>
            </div>
        </div>

        <div class="flex-1 flex flex-col relative bg-slate-50 lg:bg-white custom-scroll overflow-y-auto">

            <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
                style="background-image: radial-gradient(#1e3a8a 1.5px, transparent 1.5px); background-size: 24px 24px;">
            </div>

            <div
                class="relative z-10 flex flex-col flex-1 justify-center px-6 py-10 md:px-12 lg:px-16 max-w-2xl mx-auto w-full">

                <a href="index.html"
                    class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-dki-primary transition-colors mb-8 lg:mb-12 w-fit uppercase tracking-widest bg-white lg:bg-transparent px-4 py-2 lg:p-0 rounded-full shadow-sm lg:shadow-none border border-slate-100 lg:border-none">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Kembali ke Beranda
                </a>

                <div class="mb-8 lg:mb-10 text-center lg:text-left animate-fade-up">
                    <h2 class="text-2xl lg:text-3xl font-extrabold text-slate-800 mb-2 tracking-tight">Selamat Datang
                        Kembali</h2>
                    <p class="text-slate-500 font-medium text-sm lg:text-base">Pilih profil otorisasi (role) di bawah
                        ini untuk memulai sesi pengujian sistem Anda.</p>
                </div>

                <div class="space-y-3 lg:space-y-4" id="role-buttons">
                </div>

                <div class="mt-12 pt-8 border-t border-slate-200/60 flex flex-col items-center lg:items-start gap-3">
                    <div
                        class="flex items-center justify-center gap-2 text-xs font-bold text-emerald-600 bg-emerald-50 px-4 py-2 rounded-lg border border-emerald-100/50 shadow-sm w-fit">
                        <span class="relative flex h-2.5 w-2.5">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                        </span>
                        Engine Database Mockup Ready
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="assets/js/db-mock.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Logika Rotasi Slider Visual
            let slideIndex = 0;
            const slider = document.getElementById('login-slider');
            setInterval(() => {
                slideIndex = (slideIndex + 1) % 3;
                if (slider) slider.style.transform = `translateX(-${slideIndex * 100}%)`;
            }, 5000);

            // Pemeriksaan Sesi Aktif
            const currentUser = AuthEngine.getCurrentUser();
            if (currentUser) {
                const routes = { 'ADMIN': 'admin/', 'KADIS': 'kadis/', 'PENILAI': 'penilai/', 'PEGAWAI': 'pegawai/' };
                if (routes[currentUser.role]) window.location.href = routes[currentUser.role] + 'dashboard.html';
            }

            // Injeksi Tombol Role Secara Dinamis (Sesuai Struktur DKI)
            const users = (typeof MockDB !== 'undefined') ? MockDB.getUsers() : [];
            const container = document.getElementById('role-buttons');

            if (!container) return;

            const presentasiUsers = [
                users.find(u => u.role === 'KADIS'),
                users.find(u => u.id === 'U04'), // Kasi / Penilai
                users.find(u => u.id === 'U08'), // Staf / Pegawai
                users.find(u => u.role === 'ADMIN')
            ].filter(Boolean);

            presentasiUsers.forEach((user, index) => {
                const btn = document.createElement('button');

                // Efek cascade (berurutan) saat render
                btn.style.animation = `fadeUp 0.5s ease-out forwards ${0.1 + (index * 0.1)}s`;
                btn.style.opacity = '0';

                btn.className = `w-full group flex items-center justify-between p-4 lg:p-5 border border-slate-200 rounded-2xl 
                               bg-white hover:border-dki-primary/40 hover:bg-blue-50/30 hover:shadow-md 
                               transform active:scale-[0.98] lg:hover:-translate-y-1 transition-all duration-300 text-left`;

                // Menentukan Label dan Styling Warna berdasarkan Role
                let roleLabel = "Pegawai / Staf Pelapor";
                let badgeStyle = "bg-slate-100 text-slate-600";
                let iconSvg = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>`;

                if (user.role === 'ADMIN') {
                    roleLabel = "Administrator Sistem";
                    badgeStyle = "bg-slate-800 text-white";
                    iconSvg = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>`;
                } else if (user.role === 'KADIS') {
                    roleLabel = "Kepala Dinas (Top Level)";
                    badgeStyle = "bg-dki-accent text-white";
                    iconSvg = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>`;
                } else if (user.role === 'PENILAI') {
                    roleLabel = "Atasan / Penilai LKH";
                    badgeStyle = "bg-dki-primary text-white";
                    iconSvg = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>`;
                }

                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="hidden sm:flex w-12 h-12 rounded-xl items-center justify-center shrink-0 ${badgeStyle} shadow-sm group-hover:scale-105 transition-transform duration-300">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                ${iconSvg}
                            </svg>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] w-fit px-2 py-0.5 rounded uppercase font-extrabold tracking-widest mb-1 sm:hidden ${badgeStyle}">
                                ${user.role}
                            </span>
                            <strong class="text-base lg:text-lg font-extrabold text-slate-800 group-hover:text-dki-primary transition-colors tracking-tight">
                                ${roleLabel}
                            </strong>
                            <span class="text-xs font-semibold text-slate-500 mt-0.5">Login sbg: ${user.name}</span>
                        </div>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 
                                group-hover:bg-dki-primary group-hover:border-dki-primary group-hover:text-white transition-all duration-300 shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                `;

                btn.onclick = () => AuthEngine.login(user);
                container.appendChild(btn);
            });
        });
    </script>
</body>

</html>
