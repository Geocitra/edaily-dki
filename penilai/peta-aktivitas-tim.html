<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Aktivitas Tim - E-Daily Report DKI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // TONE WARNA DKI JAKARTA (Biru Jakarta, Kuning Emas, Ungu WFA)
        tailwind.config = {
            theme: { extend: { colors: { dki: { primary: '#005baa', accent: '#f59e0b', dark: '#0f172a' } } } }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Standarisasi Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .leaflet-container {
            font-family: inherit !important;
        }

        /* Shadow khusus untuk panel bottom sheet di mobile */
        .panel-shadow {
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body class="bg-slate-50 h-screen flex overflow-hidden font-sans relative">

    <div id="sidebar-overlay"
        class="fixed inset-0 bg-slate-900/60 z-[60] hidden lg:hidden backdrop-blur-sm transition-opacity"
        onclick="toggleSidebar()"></div>

    <aside id="sidebar"
        class="fixed lg:static inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 w-64 bg-dki-dark flex flex-col shadow-2xl z-[70] flex-shrink-0 transition-transform duration-300 ease-in-out h-full">
        <div class="p-6 border-b border-white/10 flex flex-col items-center text-center relative shrink-0">
            <button onclick="toggleSidebar()" class="absolute top-4 right-4 text-slate-400 hover:text-white lg:hidden">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div class="bg-white p-2.5 rounded-2xl mb-4 shadow-lg">
                <img src="../assets/img/dki.png" alt="Logo DKI Jakarta" class="h-12 object-contain">
            </div>

            <h2 class="text-white font-black tracking-wider uppercase text-sm">E-Daily Report</h2>
            <p class="text-dki-accent text-[10px] font-bold uppercase tracking-widest mt-1">Pejabat Penilai</p>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1 text-sm custom-scrollbar">
            <a href="dashboard.html"
                class="flex items-center px-4 py-2.5 text-slate-300 hover:bg-white/5 hover:text-white rounded-lg transition-colors">📊
                Dashboard Tim</a>

            <div class="px-4 mt-6 mb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">Manajemen Tim
            </div>
            <a href="validasi-lkh.html"
                class="flex items-center justify-between px-4 py-2.5 text-slate-300 hover:bg-white/5 hover:text-white rounded-lg transition-colors">
                <span>✔️ Validasi Bawahan</span>
                <span id="nav-badge-antrean"
                    class="bg-rose-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full hidden animate-pulse shadow-sm">0</span>
            </a>
            <a href="skoring-kinerja.html"
                class="flex items-center px-4 py-2.5 text-slate-300 hover:bg-white/5 hover:text-white rounded-lg transition-colors">📉
                Skoring Tim</a>

            <a href="peta-aktivitas-tim.html"
                class="flex items-center px-4 py-3 text-white bg-dki-primary/90 rounded-lg font-bold shadow-lg shadow-blue-900/20 transition-all border-l-4 border-dki-accent">🗺️
                Peta Tim (GIS)</a>

            <div class="px-4 mt-6 mb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">Kinerja Pribadi
            </div>
            <a href="input-skp.html"
                class="flex items-center px-4 py-2.5 text-slate-300 hover:bg-white/5 hover:text-white rounded-lg transition-colors">🎯
                Target SKP</a>
            <a href="input-lkh.html"
                class="flex items-center px-4 py-2.5 text-slate-300 hover:bg-white/5 hover:text-white rounded-lg transition-colors">✍️
                Input LKH</a>

            <div class="px-4 mt-6 mb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">Info</div>
            <a href="pengumuman.html"
                class="flex items-center px-4 py-2.5 text-slate-300 hover:bg-white/5 hover:text-white rounded-lg transition-colors">📢
                Instruksi Tim</a>
        </nav>

        <div class="p-4 border-t border-white/10 shrink-0">
            <button onclick="AuthEngine.logout()"
                class="w-full flex justify-center items-center py-3 bg-slate-800 text-slate-300 hover:text-white hover:bg-rose-600 rounded-xl transition-colors text-[10px] font-black uppercase tracking-widest border border-transparent hover:border-rose-500">Keluar
                Sistem</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative w-full">
        <header
            class="h-16 md:h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 z-30 shadow-sm shrink-0 relative">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()"
                    class="lg:hidden p-2 bg-slate-100 rounded-lg text-slate-500 hover:text-dki-primary focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div>
                    <h1 class="text-lg md:text-xl font-black text-dki-dark uppercase tracking-tight">Radar Aktivitas Tim
                    </h1>
                    <p class="hidden md:block text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">
                        Pemantauan Koordinat LKH Bawahan</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <select id="filter-bawahan"
                    class="bg-slate-50 border border-slate-200 rounded-full px-4 md:px-6 py-2 text-[10px] font-black text-slate-700 uppercase tracking-widest outline-none focus:ring-2 focus:ring-dki-primary max-w-[160px] md:max-w-none truncate cursor-pointer shadow-sm"
                    onchange="renderMap()">
                    <option value="ALL">👥 SEMUA ANGGOTA TIM</option>
                </select>
                <div
                    class="hidden sm:flex h-10 w-10 rounded-full bg-slate-100 text-dki-primary items-center justify-center text-lg shadow-inner font-black border border-slate-200 shrink-0">
                    👨‍💼</div>
            </div>
        </header>

        <div class="flex-1 relative flex overflow-hidden w-full h-full bg-slate-200">

            <div id="map" class="absolute inset-0 z-0"></div>

            <div id="list-panel"
                class="absolute inset-x-0 bottom-0 lg:relative lg:w-80 xl:w-96 h-[65vh] lg:h-full bg-white lg:border-r border-slate-200 flex flex-col z-[40] panel-shadow lg:shadow-2xl transform translate-y-full lg:translate-y-0 transition-transform duration-300 ease-in-out lg:rounded-none rounded-t-3xl overflow-hidden">

                <div class="w-full flex justify-center py-3 lg:hidden shrink-0 bg-white" onclick="toggleListPanel()">
                    <div class="w-12 h-1.5 bg-slate-300 rounded-full"></div>
                </div>

                <div class="relative h-24 md:h-32 overflow-hidden shrink-0 bg-dki-dark">
                    <div id="banner-slider"
                        class="absolute inset-0 flex transition-transform duration-[1.5s] ease-in-out">
                        <img src="../assets/img/dki-2.png" class="w-full h-full object-cover brightness-[0.3]" alt="">
                        <img src="../assets/img/dki-1.png" class="w-full h-full object-cover brightness-[0.3]" alt="">
                    </div>
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-dki-dark/95 to-transparent flex flex-col justify-end p-5">
                        <h4 class="text-white text-xs font-black uppercase tracking-widest">Titik Kordinat Tim</h4>
                        <div class="flex gap-1 mt-2">
                            <div class="h-1 w-4 rounded-full bg-dki-accent" id="b-dot-0"></div>
                            <div class="h-1 w-1.5 rounded-full bg-white/30" id="b-dot-1"></div>
                        </div>
                    </div>
                </div>

                <div class="p-3 md:p-4 bg-slate-50 border-b border-slate-200 shrink-0 z-10 relative">
                    <div class="grid grid-cols-4 gap-1.5 md:gap-2">
                        <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                            <span
                                class="block text-[8px] md:text-[9px] font-black text-blue-600 uppercase tracking-widest">WFO</span>
                            <span class="block text-sm md:text-lg font-black text-slate-800" id="count-wfo">0</span>
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                            <span
                                class="block text-[8px] md:text-[9px] font-black text-emerald-600 uppercase tracking-widest">WFH</span>
                            <span class="block text-sm md:text-lg font-black text-slate-800" id="count-wfh">0</span>
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                            <span
                                class="block text-[8px] md:text-[9px] font-black text-purple-600 uppercase tracking-widest">WFA</span>
                            <span class="block text-sm md:text-lg font-black text-slate-800" id="count-wfa">0</span>
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                            <span
                                class="block text-[8px] md:text-[9px] font-black text-rose-600 uppercase tracking-widest">Luar</span>
                            <span class="block text-sm md:text-lg font-black text-slate-800" id="count-luar">0</span>
                        </div>
                    </div>
                </div>

                <div id="list-bawahan-log"
                    class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50 custom-scrollbar pb-24 lg:pb-4 relative z-0">
                </div>
            </div>

            <button id="btn-toggle-panel" onclick="toggleListPanel()"
                class="lg:hidden absolute bottom-6 left-1/2 transform -translate-x-1/2 z-[50] bg-dki-dark text-white px-6 py-3.5 rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.5)] font-black text-[10px] tracking-widest flex items-center gap-2 border border-white/10 active:scale-95 transition-all">
                <span id="icon-toggle">📋</span> <span id="text-toggle">TAMPILKAN DAFTAR</span>
            </button>

        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../assets/js/db-mock.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        let map, markersGroup;
        let isPanelOpen = false;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // Logic Toggle Bottom Sheet Panel (Mobile)
        function toggleListPanel() {
            const panel = document.getElementById('list-panel');
            const btnText = document.getElementById('text-toggle');
            const btnIcon = document.getElementById('icon-toggle');

            if (isPanelOpen) {
                panel.classList.add('translate-y-full');
                btnText.innerText = "TAMPILKAN DAFTAR";
                btnIcon.innerText = "📋";
                isPanelOpen = false;
            } else {
                panel.classList.remove('translate-y-full');
                btnText.innerText = "TUTUP DAFTAR";
                btnIcon.innerText = "✖";
                isPanelOpen = true;
            }
        }

        function closeListPanelMobile() {
            if (window.innerWidth < 1024 && isPanelOpen) {
                toggleListPanel();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = AuthEngine.getCurrentUser();
            if (document.getElementById('session-user-name')) {
                document.getElementById('session-user-name').innerText = user.name;
            }

            // Cek notifikasi antrean
            const pendingLkh = MockDB.getLkhForReview(user.id);
            if (pendingLkh.length > 0) {
                const badge = document.getElementById('nav-badge-antrean');
                badge.classList.remove('hidden');
                badge.innerText = pendingLkh.length;
            }

            // Slider Mini Banner
            let slideIdx = 0;
            const slider = document.getElementById('banner-slider');
            const dots = [document.getElementById('b-dot-0'), document.getElementById('b-dot-1')];
            setInterval(() => {
                slideIdx = (slideIdx + 1) % 2;
                slider.style.transform = `translateX(-${slideIdx * 100}%)`;
                dots.forEach((dot, index) => {
                    if (index === slideIdx) {
                        dot.classList.replace('w-1.5', 'w-4');
                        dot.classList.replace('bg-white/30', 'bg-dki-accent');
                    } else {
                        dot.classList.replace('w-4', 'w-1.5');
                        dot.classList.replace('bg-dki-accent', 'bg-white/30');
                    }
                });
            }, 5000);

            populateDropdown(user.id);
            initMap();
            renderMap();
        });

        function populateDropdown(userId) {
            const bawahan = MockDB.getBawahan(userId);
            const select = document.getElementById('filter-bawahan');
            bawahan.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id; opt.innerText = `👤 ${b.name.toUpperCase()}`;
                select.appendChild(opt);
            });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-6.2088, 106.8456], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            // Pindahkan kontrol zoom ke atas sedikit agar tidak tertutup toggle button
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            document.querySelector('.leaflet-control-zoom').style.marginBottom = '80px';

            markersGroup = L.layerGroup().addTo(map);
        }

        function renderMap() {
            markersGroup.clearLayers();
            const user = AuthEngine.getCurrentUser();
            const filterId = document.getElementById('filter-bawahan').value;
            const bawahan = MockDB.getBawahan(user.id);

            let bawahanIds = filterId === 'ALL' ? bawahan.map(b => b.id) : [filterId];
            const lkhs = MockDB.getLkh().filter(l => bawahanIds.includes(l.user_id));

            let counts = { WFO: 0, WFH: 0, WFA: 0, LUAR: 0 };
            const sidebar = document.getElementById('list-bawahan-log');
            sidebar.innerHTML = '';
            let bounds = [];

            if (lkhs.length === 0) {
                document.getElementById('count-wfo').innerText = 0;
                document.getElementById('count-wfh').innerText = 0;
                document.getElementById('count-wfa').innerText = 0;
                document.getElementById('count-luar').innerText = 0;

                sidebar.innerHTML = `
                    <div class="p-8 text-center flex flex-col items-center justify-center h-full text-slate-400">
                        <span class="text-3xl mb-3">📍</span>
                        <p class="font-bold uppercase text-[10px] tracking-widest leading-loose">Tidak ada data lokasi<br>yang terekam untuk tim ini.</p>
                    </div>`;
                return;
            }

            lkhs.forEach(l => {
                if (!l.lat || !l.lng) return;
                const usr = bawahan.find(b => b.id === l.user_id);

                if (counts[l.lokasi_mode] !== undefined) {
                    counts[l.lokasi_mode]++;
                }

                // Palet warna yang diperbarui
                let markerColor = '#005baa'; // WFO
                if (l.lokasi_mode === 'WFH') markerColor = '#10b981'; // WFH
                if (l.lokasi_mode === 'WFA') markerColor = '#9333ea'; // WFA
                if (l.lokasi_mode === 'LUAR') markerColor = '#e11d48'; // LUAR

                const customIcon = L.divIcon({
                    html: `
                        <div class="relative flex items-center justify-center">
                            <div class="absolute w-5 h-5 rounded-full animate-ping opacity-60" style="background:${markerColor}"></div>
                            <div class="w-3.5 h-3.5 rounded-full border-2 border-white shadow-xl relative z-10" style="background:${markerColor}"></div>
                        </div>`,
                    className: '', iconSize: [20, 20]
                });

                const marker = L.marker([l.lat, l.lng], { icon: customIcon }).addTo(markersGroup);

                const dateObj = new Date(l.tanggal);
                const tglStr = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                const timeStr = dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                marker.bindPopup(`
                    <div class="font-sans p-1 min-w-[160px]">
                        <p class="font-black text-dki-primary uppercase tracking-tight border-b border-slate-100 pb-2 mb-2">${usr.name}</p>
                        <div class="flex justify-between items-center mb-1">
                            <span class="px-2 py-0.5 rounded text-[8px] font-black uppercase text-white tracking-widest" style="background:${markerColor}">${l.lokasi_mode}</span>
                            <span class="text-[9px] font-bold text-slate-400">${tglStr}</span>
                        </div>
                        <p class="text-[11px] text-slate-600 leading-snug mt-2 line-clamp-3">"${l.aktivitas}"</p>
                    </div>
                `);

                bounds.push([l.lat, l.lng]);

                // Render Card
                const card = document.createElement('div');
                card.className = "p-4 bg-white rounded-2xl border border-slate-100 hover:border-dki-primary cursor-pointer transition-all shadow-sm hover:shadow-md group relative";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-black text-slate-800 uppercase truncate pr-2 group-hover:text-dki-primary transition-colors">${usr.name}</span>
                        <div class="w-2 h-2 rounded-full shadow-sm flex-shrink-0" style="background:${markerColor}"></div>
                    </div>
                    <p class="text-[11px] text-slate-600 line-clamp-2 leading-relaxed mb-3">"${l.aktivitas}"</p>
                    <div class="flex items-center justify-between border-t border-slate-50 pt-2">
                        <span class="text-[9px] font-black uppercase tracking-widest" style="color:${markerColor}">📍 ${l.lokasi_mode}</span>
                        <span class="text-[9px] font-bold text-slate-400">${tglStr} • ${timeStr}</span>
                    </div>
                `;
                card.onclick = () => {
                    closeListPanelMobile();
                    map.flyTo([l.lat, l.lng], 16, { duration: 1.5 });
                    setTimeout(() => marker.openPopup(), 1500);
                };
                sidebar.appendChild(card);
            });

            document.getElementById('count-wfo').innerText = counts.WFO;
            document.getElementById('count-wfh').innerText = counts.WFH;
            document.getElementById('count-wfa').innerText = counts.WFA;
            document.getElementById('count-luar').innerText = counts.LUAR;

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
            }
        }
    </script>
</body>

</html>
